services:
  mysql:
    image: mysql:8.4
    container_name: psihub-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: psihub
      MYSQL_USER: psihub
      MYSQL_PASSWORD: psihub
      MYSQL_ROOT_PASSWORD: root
      TZ: America/Sao_Paulo
    ports:
      - "3306:3306"
    volumes:
      - psihub_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  psihub_mysql_data:
