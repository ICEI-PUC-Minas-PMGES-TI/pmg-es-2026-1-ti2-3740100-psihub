# ──────────────────────────────────────────────────────────────────────────────
# Profile "dev" — usado APENAS em ambiente local (ativado pelo dev.ps1).
# NUNCA ative este profile em producao.
# ──────────────────────────────────────────────────────────────────────────────

spring:
  flyway:
    # [FIX 1] repair-on-migrate substitui o antigo cleanOnValidationError
    # (removido no Flyway 9+). Quando um script de migration já aplicado
    # é editado, o Flyway atualiza o checksum na tabela de histórico e
    # continua sem erro. O schema em si é atualizado pelo ddl-auto: update.
    repair-on-migrate: true

    # [FIX 2] Garante que arquivos com nome fora do padrão
    # (ex: V1_sem_dois_underscores.sql) causem erro imediato, em vez de
    # serem silenciosamente ignorados pelo Flyway.
    validate-migration-naming: true

  jpa:
    # Em dev, "update" é mais tolerante: o Hibernate aplica ALTER TABLE
    # automaticamente para cobrir diferenças menores entre entidade e banco.
    # Em prod usa-se "validate" (application.yml).
    hibernate:
      ddl-auto: update

logging:
  level:
    # [FIX 3] INFO é suficiente para ver o que o Flyway está fazendo;
    # DEBUG gerava dezenas de linhas de scanner por migration.
    org.flywaydb: INFO
    # SQL das queries visível sem o TRACE de bind parameters,
    # que é extremamente verboso e raramente necessário.
    org.hibernate.SQL: DEBUG
