spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: psihub-backend
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/psihub?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo}
    username: ${DB_USERNAME:psihub}
    password: ${DB_PASSWORD:psihub}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: America/Sao_Paulo

server:
  port: ${SERVER_PORT:8080}

app:
  cors:
    allowed-origin-patterns: ${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*}
  security:
    jwt-secret: ${JWT_SECRET:}
    jwt-expiration-days: ${JWT_EXPIRATION_DAYS:7}
