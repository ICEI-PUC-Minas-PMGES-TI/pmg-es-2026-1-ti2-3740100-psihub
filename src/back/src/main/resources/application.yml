spring:
  application:
    name: psihub-backend
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/psihub?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo}
    username: ${DB_USERNAME:psihub}
    password: ${DB_PASSWORD:psihub}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: America/Sao_Paulo

server:
  port: ${SERVER_PORT:8080}
